<!DOCTYPE html>
<html>

<head>

    <title>AIAA Chat</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#0f172a;
            color:white;
            display:flex;
            height:100vh;
        }

        .sidebar{

            width:260px;
            background:#111827;
            padding:20px;

            display:flex;
            flex-direction:column;

        }

        .sidebar h2{
            margin-bottom:30px;
        }

        .menu-btn{

            background:#1e293b;
            padding:15px;
            border-radius:12px;
            margin-bottom:15px;

            text-decoration:none;
            color:white;

        }

        .logout{

            margin-top:auto;

            background:#dc2626;
            text-align:center;
        }

        .main{

            flex:1;

            display:flex;
            flex-direction:column;

        }

        .topbar{

            background:#111827;

            padding:20px;

            border-bottom:1px solid #1e293b;

        }

        .chat-container{

            flex:1;

            overflow-y:auto;

            padding:30px;

        }

        .message{

            max-width:70%;

            padding:18px;

            border-radius:20px;

            margin-bottom:20px;

            line-height:1.7;

            white-space:pre-wrap;

        }

        .user{

            background:#2563eb;

            margin-left:auto;

        }

        .assistant{

            background:#1e293b;

        }

        .bottom{

            padding:20px;

            border-top:1px solid #1e293b;

            background:#111827;

        }

        form{

            display:flex;

            gap:15px;

        }

        textarea{

            flex:1;

            resize:none;

            background:#1e293b;

            border:none;

            outline:none;

            color:white;

            padding:20px;

            border-radius:20px;

            height:70px;

            font-size:16px;

        }

        button{

            background:#2563eb;

            border:none;

            color:white;

            width:120px;

            border-radius:20px;

            cursor:pointer;

            font-size:16px;

        }

        button:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>


<div class="sidebar">

    <h2>AIAA</h2>

    <a
            class="menu-btn"
            href="/chat">

        💬 Chat

    </a>


    <a
            class="menu-btn"
            href="/upload">

        📄 Knowledge Base

    </a>


    <a
            class="menu-btn logout"
            href="/logout">

        Logout

    </a>

</div>



<div class="main">

    <div class="topbar">

        Logged in as

        <b>

            {{email}}

        </b>

    </div>



    <div
            class="chat-container"
            id="chat-container">

        {% for msg in messages %}

        <div

                class="message {{msg.role}}">

            {{msg.content}}

        </div>

        {% endfor %}

    </div>




    <div class="bottom">

        <form method="POST">

            <textarea

                    name="message"

                    placeholder="Ask anything..."

                    required>

            </textarea>

            <button>

                Send

            </button>

        </form>

    </div>

</div>


<script>

    let container = document.getElementById(

        "chat-container"

    );

    container.scrollTop = container.scrollHeight;

</script>


</body>

</html>

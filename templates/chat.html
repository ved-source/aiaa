<!DOCTYPE html>
<html>
<head>
    <title>AIAA Chat</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            margin:0;
        }

        .topbar{
            background:black;
            color:white;
            padding:15px;
        }

        .chat-box{
            width:80%;
            margin:auto;
            height:70vh;
            overflow-y:auto;
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
        }

        .user{
            background:#d9ecff;
            padding:12px;
            border-radius:10px;
            margin:10px 0;
            text-align:right;
        }

        .assistant{
            background:#efefef;
            padding:12px;
            border-radius:10px;
            margin:10px 0;
        }

        .bottom{
            width:80%;
            margin:auto;
            display:flex;
            gap:10px;
            margin-top:20px;
        }

        input{
            flex:1;
            padding:15px;
        }

        button{
            width:120px;
        }

    </style>
</head>
<body>

<div class="topbar">

    Logged in as {{ email }}

    <a href="/logout" style="color:white;float:right">
        Logout
    </a>

</div>

<div class="chat-box">

    {% for message in messages %}

        {% if message.role=="user" %}

            <div class="user">
                {{ message.content }}
            </div>

        {% else %}

            <div class="assistant">
                {{ message.content }}
            </div>

        {% endif %}

    {% endfor %}

</div>


<form method="POST">

<div class="bottom">

    <input
        type="text"
        name="message"
        placeholder="Ask something..."
        required
    >

    <button type="submit">
        Send
    </button>

</div>

</form>

</body>
</html>

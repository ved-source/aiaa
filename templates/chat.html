<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIAA Chat</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style>
        :root {
            --bg-primary: #080d1a;
            --bg-sidebar: #0e1424;
            --card-bg: rgba(19, 27, 46, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
            --accent-color: #3b82f6;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --user-bubble: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            --assistant-bubble: #172033;
            --shadow-premium: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            margin-bottom: 10px;
        }

        .logo-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: transparent;
            padding: 14px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .menu-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .menu-btn.active {
            color: var(--text-primary);
            background: rgba(59, 130, 246, 0.1);
            border-color: rgba(59, 130, 246, 0.15);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.05);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border-color);
            margin: 10px 0;
        }

        .user-profile {
            margin-top: auto;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--accent-gradient);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }

        .user-email {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 170px;
        }

        .menu-btn.logout {
            margin-top: 5px;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.08);
            color: #f87171;
            font-size: 14px;
            justify-content: center;
        }

        .menu-btn.logout:hover {
            background: rgba(239, 68, 68, 0.16);
            color: #ef4444;
        }

        /* Main Workspace */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-primary);
            position: relative;
        }

        /* Topbar */
        .topbar {
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(8, 13, 26, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        /* Chat Window */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Message Bubbles */
        .message {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            background: var(--user-bubble);
            color: #ffffff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15);
        }

        .message.assistant {
            background: var(--assistant-bubble);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* Markdown styling inside assistant message */
        .message.assistant p {
            margin-bottom: 12px;
        }
        .message.assistant p:last-child {
            margin-bottom: 0;
        }
        .message.assistant ul, .message.assistant ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }
        .message.assistant li {
            margin-bottom: 4px;
        }
        .message.assistant code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 6px;
            border-radius: 6px;
            font-size: 14px;
        }
        .message.assistant pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .message.assistant pre code {
            padding: 0;
            background: transparent;
            border-radius: 0;
        }
        .message.assistant blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 12px;
            color: var(--text-secondary);
            margin: 12px 0;
        }
        .message.assistant table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        .message.assistant th, .message.assistant td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }
        .message.assistant th {
            background: rgba(255, 255, 255, 0.03);
        }

        .message.error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Typing Bouncing Dots */
        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 16px 24px;
        }

        .typing .dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing .dot:nth-child(1) { animation-delay: -0.32s; }
        .typing .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.3); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* Input Container */
        .input-bar-container {
            padding: 24px 40px;
            border-top: 1px solid var(--border-color);
            background: rgba(8, 13, 26, 0.9);
        }

        .input-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px 16px;
            max-width: 1000px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .input-form:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea {
            flex: 1;
            resize: none;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            padding: 8px 4px;
            font-size: 15px;
            line-height: 1.5;
            height: 38px; /* start line */
            max-height: 150px;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent-gradient);
            border: none;
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.25);
        }

        .send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.35);
            filter: brightness(1.1);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            box-shadow: none;
            cursor: not-allowed;
            color: var(--text-muted);
            transform: none;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-section">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">AIAA</span>
    </div>

    <a class="menu-btn active" href="/chat">
        💬 Chat
    </a>

    <a class="menu-btn" href="/upload">
        📄 Knowledge Base
    </a>

    <div class="sidebar-divider"></div>

    <div class="user-profile">
        <div class="user-info">
            <div class="user-avatar" id="avatar-letter">U</div>
            <div class="user-email">{{email}}</div>
        </div>
        <a class="menu-btn logout" href="/logout">Logout</a>
    </div>
</div>

<div class="main-workspace">
    <div class="topbar">
        <div class="topbar-title">
            <div class="status-dot"></div>
            AIAA Assistant
        </div>
        <div style="font-size: 13px; color: var(--text-secondary)">
            Enterprise RAG
        </div>
    </div>

    <div class="chat-container" id="chat-container">
        {% for msg in messages %}
        <div class="message {{msg.role}}" data-raw="{{msg.content}}">
            {{msg.content}}
        </div>
        {% endfor %}
    </div>

    <div class="input-bar-container">
        <form class="input-form" id="chat-form" method="POST">
            <textarea
                name="message"
                id="message-input"
                placeholder="Ask anything..."
                required
                rows="1"
            ></textarea>
            <button type="submit" class="send-btn" id="send-btn" title="Send Message">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    const chatContainer = document.getElementById("chat-container");
    const textarea = document.getElementById("message-input");
    const sendButton = document.getElementById("send-btn");
    const chatForm = document.getElementById("chat-form");
    const emailStr = "{{email}}";

    // Set Avatar Initial Letter
    if (emailStr && emailStr.length > 0) {
        document.getElementById("avatar-letter").innerText = emailStr.charAt(0).toUpperCase();
    }

    function scrollToBottom() {
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Set up marked parser
    marked.use({
        gfm: true,
        breaks: true
    });

    function renderMarkdown() {
        document.querySelectorAll('.message.assistant').forEach(el => {
            if (!el.classList.contains('rendered')) {
                const rawText = el.getAttribute('data-raw') || el.innerText.trim();
                el.setAttribute('data-raw', rawText);
                el.innerHTML = marked.parse(rawText);
                el.classList.add('rendered');
            }
        });
    }

    // Initial render and scroll
    renderMarkdown();
    scrollToBottom();

    // Auto-resize textarea
    textarea.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if (this.scrollHeight > 150) {
            this.style.overflowY = 'auto';
            this.style.height = '150px';
        } else {
            this.style.overflowY = 'hidden';
        }
    });

    // Enter key sends, shift+enter inserts newline
    textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            chatForm.requestSubmit();
        }
    });

    // AJAX Form submission
    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const queryText = textarea.value.trim();
        if (!queryText) return;

        // Append User Message bubble
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerText = queryText;
        chatContainer.appendChild(userDiv);

        // Append Typing Bubble
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant typing';
        typingDiv.id = 'typing-indicator';
        typingDiv.innerHTML = `
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        `;
        chatContainer.appendChild(typingDiv);
        scrollToBottom();

        // Clear input, disable fields
        textarea.value = '';
        textarea.style.height = '38px';
        textarea.disabled = true;
        sendButton.disabled = true;
        textarea.placeholder = "Thinking...";

        // Send request
        const formData = new FormData();
        formData.append('message', queryText);

        fetch('/chat', {
            method: 'POST',
            body: formData
        })
        .then(res => {
            if (!res.ok) throw new Error('Response error');
            return res.text();
        })
        .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const newChatContainer = doc.getElementById('chat-container');
            
            // Overwrite content
            chatContainer.innerHTML = newChatContainer.innerHTML;
            
            // Re-enable and reset
            textarea.disabled = false;
            sendButton.disabled = false;
            textarea.placeholder = "Ask anything...";
            textarea.focus();
            
            renderMarkdown();
            scrollToBottom();
        })
        .catch(err => {
            console.error('Request failed:', err);
            
            // Remove typing indicator
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();

            textarea.disabled = false;
            sendButton.disabled = false;
            textarea.placeholder = "Ask anything...";

            const errorDiv = document.createElement('div');
            errorDiv.className = 'message assistant error-msg';
            errorDiv.innerText = "Error: Failed to fetch completion. Please try sending your prompt again.";
            chatContainer.appendChild(errorDiv);
            scrollToBottom();
        });
    });
</script>
</body>
</html>

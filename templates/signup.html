<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AIAA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="logo-container">
        <div class="logo-icon">🤖</div>
    </div>
    
    <h1>Create Account</h1>
    <p class="subtitle">Set up your account and initialize your tenant database</p>

    <form method="POST">
        <div class="form-group">
            <label for="company_name">Company Name</label>
            <input type="text" id="company_name" name="company_name" placeholder="Acme Inc." required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" required>
        </div>

        <div class="form-group" style="display:flex; align-items:flex-start; gap:10px; margin-top:15px;">
            <input type="checkbox" id="consent" name="consent" required style="width:16px; height:16px; accent-color:#3b82f6; margin-top:2px; cursor:pointer;">
            <label for="consent" style="font-size:12px; line-height:1.4; color:var(--text-secondary); cursor:pointer;">
                I agree to the <a href="/terms" target="_blank" style="color:#3b82f6; text-decoration:underline;">Terms of Service</a> and <a href="/privacy" target="_blank" style="color:#3b82f6; text-decoration:underline;">Privacy Policy</a>, and consent to data processing.
            </label>
        </div>

        <button type="submit">Sign Up</button>
    </form>

    <div class="footer-link">
        Already have an account? <a href="/login">Log In</a>
    </div>
</div>

</body>
</html>
